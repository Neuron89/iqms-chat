<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}IQMS Chat{% endblock %}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
    --fg: #f1f5f9; --fg2: #94a3b8;
    --amber: #f59e0b; --amber-dim: #92400e;
    --navy: #1e3a5f;
    --border: #475569;
    --font: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    --radius: 8px;
    --green: #22c55e; --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--fg); min-height: 100vh; }
  a { color: var(--amber); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .navbar {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .navbar h1 { font-size: 1.25rem; font-weight: 700; }
  .navbar h1 span { color: var(--amber); }
  .navbar .nav-right { display: flex; align-items: center; gap: 1rem; font-size: 0.9rem; color: var(--fg2); }
  .navbar .nav-right a { color: var(--fg2); }
  .navbar .nav-right a:hover { color: var(--amber); text-decoration: none; }

  .flash { padding: 0.75rem 1rem; border-radius: var(--radius); margin-bottom: 1rem; }
  .flash-error { background: #7f1d1d; color: #fca5a5; }
  .flash-success { background: #14532d; color: #86efac; }

  .login-wrap { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
  .login-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 2rem; width: 100%; max-width: 380px;
  }
  .login-card h2 { margin-bottom: 1.5rem; text-align: center; }
  .login-card h2 span { color: var(--amber); }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; margin-bottom: 0.25rem; font-size: 0.85rem; color: var(--fg2); }
  .form-group input, .form-group select {
    width: 100%; padding: 0.6rem 0.75rem; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--bg); color: var(--fg);
    font-size: 0.95rem; font-family: var(--font); outline: none;
  }
  .form-group input:focus { border-color: var(--amber); }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
    padding: 0.6rem 1.25rem; border-radius: var(--radius); border: none;
    font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.15s;
    font-family: var(--font);
  }
  .btn-primary { background: var(--amber); color: #000; width: 100%; }
  .btn-primary:hover { background: #d97706; }
  .btn-sm {
    padding: 0.3rem 0.6rem; font-size: 0.8rem; border-radius: 4px;
    background: var(--bg3); color: var(--fg); border: none; cursor: pointer;
    font-family: var(--font);
  }
  .btn-sm:hover { background: var(--amber); color: #000; }
  .btn-danger { background: #7f1d1d; color: #fca5a5; }
  .btn-danger:hover { background: var(--red); color: #fff; }
</style>
{% block head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
